<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pretext 引力场演化 - 核心体验区</title>
  <style>
    :root {
      --bg-color: #0F1014;
      --text-color: #E5E7EB;
      --card-bg: rgba(40, 40, 50, 0.4);
      --card-hover-bg: rgba(60, 60, 75, 0.6);
      --card-border: rgba(255, 255, 255, 0.1);
      --card-hover-border: rgba(255, 255, 255, 0.3);
      --accent: #1e90ff;
    }

    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: var(--bg-color);
      color: var(--text-color);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      position: relative;
    }
    
    .bg-animation {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 50% 50%, #1a1a24 0%, #0F1014 60%);
      z-index: -1;
    }

    /* Subtly moving glowing orbs in the background */
    .bg-animation::before, .bg-animation::after {
      content: '';
      position: absolute;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      filter: blur(100px);
      z-index: -1;
      opacity: 0.15;
      animation: drift 20s infinite alternate ease-in-out;
    }
    .bg-animation::before {
      top: -100px;
      left: -100px;
      background: #ffffff;
    }
    .bg-animation::after {
      bottom: -100px;
      right: -100px;
      background: #4a90e2;
      animation-delay: -10s;
    }

    .title {
      font-size: 32px;
      font-weight: 300;
      letter-spacing: 4px;
      margin-bottom: 60px;
      text-align: center;
      animation: fadeInDown 1.2s cubic-bezier(0.2, 0.8, 0.2, 1);
    }
    
    .menu-container {
      display: flex;
      gap: 40px;
      animation: fadeInUp 1.2s cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    .card {
      width: 280px;
      height: 160px;
      border-radius: 16px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-decoration: none;
      color: var(--text-color);
      transition: all 0.5s cubic-bezier(0.3, 1, 0.3, 1);
      position: relative;
      overflow: hidden;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
    }

    /* Dynamic internal glow on hover */
    .card::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 150%;
      height: 150%;
      background: radial-gradient(circle, rgba(255,255,255,0.08) 0%, transparent 60%);
      transform: translate(-50%, -50%) scale(0.5);
      opacity: 0;
      transition: all 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
      pointer-events: none;
    }

    .card:hover {
      background: var(--card-hover-bg);
      transform: translateY(-8px);
      border-color: var(--card-hover-border);
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.6);
    }

    .card:hover::before {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }

    .card-title {
      font-size: 20px;
      font-weight: 500;
      margin-bottom: 12px;
      letter-spacing: 1px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* Canvas icon representation */
    .icon-canvas {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: linear-gradient(135deg, #f0f0f0, #888);
      box-shadow: 0 0 8px rgba(255,255,255,0.5);
    }

    /* DOM icon representation */
    .icon-dom {
      width: 12px;
      height: 12px;
      border-radius: 2px;
      background: linear-gradient(135deg, #4a90e2, #2962ff);
      box-shadow: 0 0 8px rgba(74,144,226,0.5);
    }

    .card-subtitle {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.5);
      font-weight: 300;
    }

    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-40px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(40px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes drift {
      0% { transform: translate(0, 0); }
      100% { transform: translate(50px, 50px); }
    }
  </style>
</head>
<body>
  <div class="bg-animation"></div>
  <div class="title">选择物理引擎模式</div>
  
  <div class="menu-container">
    <a href="index.html" class="card">
      <div class="card-title">
        阴阳 - pretext
        <div class="icon-canvas"></div>
      </div>
      <div class="card-subtitle">基于 Canvas 原生引擎</div>
    </a>
    
    <a href="index2.html" class="card">
      <div class="card-title">
        阴阳 - traditional
        <div class="icon-dom"></div>
      </div>
      <div class="card-subtitle">基于 CSS DOM 引擎</div>
    </a>
  </div>
</body>
</html>
